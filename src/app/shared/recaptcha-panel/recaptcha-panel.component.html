<section class="overlay" [class.visible]="visible" (click)="cancel()">
  <div class="overlay-surface" (click)="$event.stopPropagation()">
    <div class="captcha-shell">
      <div class="captcha-slot" #captchaSlot></div>
      <div class="captcha-info" aria-live="polite">
        @if (state === 'loading') {
          <span class="info-copy">正在加载人机验证...</span>
        } @else if (state === 'error') {
          <span class="info-copy">{{ errorMessage || '人机验证组件加载失败。' }}</span>
        } @else {
          <span class="info-copy">没看到人机认证组件？</span>
        }
        <button type="button" class="retry-action" (click)="retry()" [disabled]="busy">点击此处重新加载</button>
      </div>
    </div>
  </div>
</section>
