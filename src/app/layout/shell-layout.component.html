<div class="shell" [class.nav-expanded]="navOpen()">
  <header class="topbar">
    <div class="nav-cluster">
      <button type="button" class="nav-trigger" (click)="toggleNav()">
        <span class="nav-brand">QT.</span>
        <span class="nav-current">{{ currentSectionLabel() }}</span>
        <span class="nav-caret">{{ navOpen() ? '−' : '▾' }}</span>
      </button>

      @if (navOpen()) {
        <nav class="nav-flyout">
          @if (shouldShowLoginNav()) {
            <a routerLink="/login" routerLinkActive="active" (click)="closeNav()">登录 / 注册</a>
          }
          <a routerLink="/apps" routerLinkActive="active" (click)="closeNav()">应用中心</a>
          <a routerLink="/settings" routerLinkActive="active" (click)="closeNav()">用户设置</a>
        </nav>
      }
    </div>

    <div class="topbar-status">
      <span class="status-user">{{ session.user()?.nickname || session.user()?.qitian || '访客' }}</span>
      <span class="status-separator">/</span>
      <span>{{ sessionStatusText() }}</span>
    </div>
  </header>

  <section class="stage">
    <div class="sphere-stage">
      <div class="sphere-glow"></div>
      <div class="sphere-shadow"></div>
      <div class="sphere-gyro">
        <app-shell-sphere />
      </div>
      <div class="stage-caption">
        <div class="caption-line">Qitian Account Surface</div>
        <div class="caption-line dim">验证、应用与资料在同一层里切换</div>
      </div>
    </div>

    <section class="content-drawer">
      <div class="drawer-shell">
        <div class="drawer-pin pin-left"></div>
        <div class="drawer-pin pin-right"></div>
        <div class="drawer-blur"></div>
        <div class="drawer-scroll">
          <router-outlet />
        </div>
      </div>
    </section>
  </section>
</div>
